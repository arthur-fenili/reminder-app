name: Build and Deploy to DisCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Create .env file
        run: |
          {
            echo "DB_URL=${{ secrets.DB_URL }}"
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}"
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
            echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}"
            echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}"
            echo "PIX_KEY=${{ secrets.PIX_KEY }}"
            echo "REMINDER_CRON=${{ secrets.REMINDER_CRON }}"
          } > .env

      - name: Create deployment zip
        run: |
          mkdir -p deploy
          cp target/reminder-app.jar deploy/
          cp discloud.config deploy/
          cp .env deploy/
          cd deploy && zip -r ../reminder-app.zip .

      - name: Deploy to DisCloud
        uses: discloud/deploy-action@v1
        with:
          token: ${{ secrets.DISCLOUD_TOKEN }}
          app_id: youtube-reminder
          glob: reminder-app.zip
